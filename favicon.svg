<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="18%" stop-color="#F4D98A"/>
      <stop offset="40%" stop-color="#D6A847"/>
      <stop offset="62%" stop-color="#B98524"/>
      <stop offset="82%" stop-color="#E6C66E"/>
      <stop offset="100%" stop-color="#FFF5C8"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10"
          flood-color="#000000" flood-opacity="0.35"/>
    </filter>

  </defs>

  <rect
      x="8"
      y="8"
      width="496"
      height="496"
      rx="104"
      fill="url(#bg)"/>

  <text
      x="145"
      y="340"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="265"
      fill="url(#gold)"
      filter="url(#shadow)">
      A
  </text>

  <text
      x="265"
      y="382"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="240"
      fill="url(#gold)"
      filter="url(#shadow)">
      S
  </text>

</svg>